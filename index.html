<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Body</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HB 회원">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0071e3; --blue-bg: #e8f2ff;
      --text: #1d1d1f; --text-2: #6e6e73; --text-3: #a1a1a6;
      --border: #d2d2d7; --border-s: #e8e8ed;
      --good: #1d7a45; --good-bg: #f0faf4; --good-l: #d1f0e0;
      --next: #1a56b0; --next-bg: #f0f5ff; --next-l: #c7d9f8;
      --lv1c:#c04000;--lv1b:#fff0e6; --lv2c:#b45309;--lv2b:#fffbf0;
      --lv3c:#1d7a45;--lv3b:#f0faf4; --lv4c:#1a56b0;--lv4b:#f0f5ff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Apple SD Gothic Neo', sans-serif;
      background: #fff; color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 24px; background: #f5f5f7;
    }
    .login-wrap { width: 100%; max-width: 380px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-text { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .login-logo-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }
    .login-card {
      background: white; border-radius: 20px; padding: 32px 28px;
      border: 1px solid var(--border-s);
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .login-greeting { font-size: 21px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-2); margin-bottom: 22px; line-height: 1.5; }
    .lfield { display: flex; flex-direction: column; gap: 6px; margin-bottom: 13px; }
    .lfield label { font-size: 11px; font-weight: 600; color: var(--text-2); letter-spacing: 0.06em; text-transform: uppercase; }
    .lfield input {
      padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 15px; font-family: inherit;
      color: var(--text); outline: none; transition: border-color 0.15s;
    }
    .lfield input:focus { border-color: var(--blue); }
    .lfield input::placeholder { color: var(--text-3); }
    .login-err {
      font-size: 13px; color: #ff3b30; display: none;
      padding: 10px 14px; background: #fff0ef;
      border-radius: 8px; margin-bottom: 12px;
    }
    .btn-login {
      width: 100%; padding: 14px; background: var(--blue); color: white;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: opacity 0.15s; margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.9; }
    .login-hint { text-align: center; font-size: 12px; color: var(--text-3); margin-top: 14px; line-height: 1.5; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; padding-bottom: 60px; }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.88);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border-s);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .brand { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
    .mpill { font-size: 12px; font-weight: 600; color: var(--text-2); }
    .lv-pill { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 100px; }
    .lv1p{background:var(--lv1b);color:var(--lv1c);}
    .lv2p{background:var(--lv2b);color:var(--lv2c);}
    .lv3p{background:var(--lv3b);color:var(--lv3c);}
    .lv4p{background:var(--lv4b);color:var(--lv4c);}
    .btn-logout { font-size: 12px; color: var(--text-3); background: none; border: none; cursor: pointer; font-family: inherit; padding: 4px 8px; }

    /* Tab bar */
    .tab-bar { display: flex; border-bottom: 1px solid var(--border-s); padding: 0 20px; background: white; }
    .tab-btn {
      padding: 12px 18px; font-size: 14px; font-weight: 500;
      color: var(--text-3); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: pointer;
      font-family: inherit; transition: all 0.15s; margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--blue); font-weight: 600; }

    /* ── CALENDAR TAB ── */
    #tabCal { max-width: 540px; margin: 0 auto; padding: 24px 20px; }

    /* Feedback received banner */
    .fb-banner {
      display: none; background: var(--good-bg);
      border: 1px solid var(--good-l); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 20px;
    }
    .fb-banner.show { display: block; }
    .fb-banner-title { font-size: 13px; font-weight: 700; color: var(--good); margin-bottom: 4px; }
    .fb-banner-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    /* Month stats */
    .month-stats {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .stat-card {
      flex: 1; background: #f9f9fb;
      border: 1px solid var(--border-s); border-radius: 12px;
      padding: 12px 14px; text-align: center;
    }
    .stat-card .sn { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .stat-card .sl { font-size: 11px; color: var(--text-3); margin-top: 2px; letter-spacing: 0.03em; }

    /* Calendar nav */
    .cal-nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-ym { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .cal-nav-btns { display: flex; gap: 8px; }
    .cal-nav {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid var(--border); background: white;
      color: var(--text); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .cal-nav:hover { background: #f5f5f7; }

    .cal-dow { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 6px; }
    .cal-dow-cell { text-align: center; font-size: 11px; font-weight: 600; color: var(--text-3); padding: 4px 0; letter-spacing: 0.04em; }

    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .cal-cell {
      aspect-ratio: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 10px; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      position: relative; color: var(--text);
      border: 1.5px solid transparent;
      -webkit-tap-highlight-color: transparent;
      /* Safari fallback for aspect-ratio */
      min-height: 40px;
    }
    /* Ensure square cells on older Safari */
    @supports not (aspect-ratio: 1) {
      .cal-cell { padding-bottom: 100%; height: 0; min-height: 0; }
      .cal-grid { grid-auto-rows: 1fr; }
    }
    .cal-cell.empty { cursor: default; }
    .cal-cell:not(.empty):not(.session):hover { background: #f5f5f7; }
    .cal-cell.today { border-color: var(--blue); color: var(--blue); font-weight: 700; }
    .cal-cell.planned { background: var(--blue-bg); color: var(--blue); border-color: transparent; }
    .cal-cell.planned.today { border-color: var(--blue); }
    .cal-cell.rest { background: #f2f2f7; color: var(--text-3); border-color: transparent; }
    .cal-cell.session { background: var(--good); color: white; border-color: transparent; cursor: pointer; }
    .cal-cell.session.today { border-color: rgba(255,255,255,0.6); box-shadow: 0 0 0 2px var(--good); }
    .cal-cell.past:not(.session):not(.planned):not(.rest) { color: var(--text-3); }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.7); margin-top: 2px; }

    .cal-legend { display: flex; gap: 14px; margin-top: 14px; flex-wrap: wrap; }
    .leg-it { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
    .leg-dot { width: 10px; height: 10px; border-radius: 3px; }
    .cal-guide { margin-top: 10px; font-size: 12px; color: var(--text-3); text-align: center; line-height: 1.5; }

    /* Monthly report */
    .report-card {
      margin-top: 24px; border-radius: 16px;
      border: 1px solid var(--border-s);
      overflow: hidden;
    }
    .report-header {
      padding: 16px 20px;
      display: flex; align-items: center; gap: 10px;
      background: #f9f9fb; border-bottom: 1px solid var(--border-s);
    }
    .report-icon { font-size: 18px; }
    .report-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .report-body { padding: 18px 20px; background: white; }

    .report-row {
      display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .report-stat {
      background: #f9f9fb; border-radius: 10px; padding: 12px 16px;
      border: 1px solid var(--border-s); flex: 1; min-width: 80px; text-align: center;
    }
    .rs-num { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
    .rs-lbl { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    .report-item {
      border-radius: 11px; padding: 12px 14px; margin-bottom: 10px;
    }
    .report-item.good-item { background: var(--good-bg); border: 1px solid var(--good-l); }
    .report-item.next-item { background: var(--next-bg); border: 1px solid var(--next-l); }
    .ri-label { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 5px; }
    .good-item .ri-label { color: var(--good); }
    .next-item .ri-label { color: var(--next); }
    .ri-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .ri-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }
    .ri-count { font-size: 11px; color: var(--text-3); margin-top: 4px; }

    .report-recommend {
      background: linear-gradient(135deg, #f0f5ff 0%, #e8f2ff 100%);
      border: 1px solid var(--next-l); border-radius: 12px;
      padding: 14px 16px; margin-top: 14px;
    }
    .rr-label { font-size: 11px; font-weight: 700; color: var(--next); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
    .rr-text { font-size: 14px; color: var(--text); line-height: 1.6; font-weight: 500; }

    /* ── REPORT TAB ── */
    #tabReport { max-width: 540px; margin: 0 auto; padding: 24px 20px; display: none; }
    .report-month-nav {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .rm-label { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
    .no-data { text-align: center; padding: 60px 20px; color: var(--text-3); font-size: 14px; }

    /* ── SESSION POPUP ── */
    .sess-overlay {
      display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0;
      background: rgba(0,0,0,0.3);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .sess-overlay.open { display: flex; }
    .sess-box {
      background: white; border-radius: 24px 24px 0 0;
      width: 100%; max-width: 500px; padding: 24px 24px 40px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }
    .sess-handle { width: 36px; height: 4px; background: var(--border-s); border-radius: 2px; margin: 0 auto 16px; }
    .sess-date { font-size: 13px; color: var(--text-3); margin-bottom: 16px; font-weight: 500; }
    .sess-item {
      border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    }
    .sess-item.good { background: var(--good-bg); border: 1px solid var(--good-l); }
    .sess-item.next { background: var(--next-bg); border: 1px solid var(--next-l); }
    .sess-label { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; }
    .sess-item.good .sess-label { color: var(--good); }
    .sess-item.next .sess-label { color: var(--next); }
    .sess-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
    .sess-text { font-size: 13px; color: var(--text-2); line-height: 1.55; }
    .sess-close {
      width: 100%; padding: 13px; background: #f5f5f7;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; color: var(--text-2);
      margin-top: 6px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text); color: white;
      font-size: 13px; font-weight: 500; padding: 10px 22px;
      border-radius: 100px; opacity: 0; pointer-events: none;
      transition: all 0.28s; z-index: 300; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      #tabCal, #tabReport { padding: 18px 14px; }
      .cal-cell { font-size: 13px; border-radius: 8px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-text">Hello Body</div>
      <div class="login-logo-sub">회원 전용 페이지</div>
    </div>
    <div class="login-card">
      <div class="login-greeting" id="loginGreeting">안녕하세요!</div>
      <div class="login-sub">이름과 전화번호를 입력해서<br>내 대시보드에 접속하세요.</div>
      <div class="lfield">
        <label>이름</label>
        <input type="text" id="inp-name" placeholder="이름을 입력하세요" autocomplete="name">
      </div>
      <div class="lfield">
        <label>전화번호</label>
        <input type="tel" id="inp-phone" placeholder="01012345678 (숫자 11자리)" autocomplete="tel">
      </div>
      <div class="login-err" id="loginErr">이름 또는 전화번호가 일치하지 않아요.</div>
      <button class="btn-login" onclick="doLogin()">로그인</button>
      <div class="login-hint">강사님이 보내준 링크로 접속하지 않으셨나요?<br>링크를 다시 확인해주세요.</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="brand">Hello Body</div>
    <div class="mpill" id="topName"></div>
    <div class="lv-pill" id="topLevel"></div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tbCal" onclick="switchTab('cal')">운동 캘린더</button>
    <button class="tab-btn" id="tbRep" onclick="switchTab('report')">월별 리포트</button>
  </div>

  <!-- Calendar tab -->
  <div id="tabCal">
    <div class="fb-banner" id="fbBanner">
      <div class="fb-banner-title">피드백이 도착했어요!</div>
      <div class="fb-banner-text" id="fbBannerText"></div>
    </div>
    <div class="month-stats" id="monthStats"></div>
    <div class="cal-nav-row">
      <div class="cal-ym" id="calYM"></div>
      <div class="cal-nav-btns">
        <button class="cal-nav" onclick="calMove(-1)">&#8249;</button>
        <button class="cal-nav" onclick="calMove(1)">&#8250;</button>
      </div>
    </div>
    <div class="cal-dow">
      <div class="cal-dow-cell">일</div><div class="cal-dow-cell">월</div>
      <div class="cal-dow-cell">화</div><div class="cal-dow-cell">수</div>
      <div class="cal-dow-cell">목</div><div class="cal-dow-cell">금</div>
      <div class="cal-dow-cell">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-legend">
      <div class="leg-it"><div class="leg-dot" style="background:var(--good)"></div>피드백 받은 날</div>
      <div class="leg-it"><div class="leg-dot" style="background:var(--blue-bg);border:1.5px solid var(--blue)"></div>운동 예정</div>
      <div class="leg-it"><div class="leg-dot" style="background:#f2f2f7"></div>휴식</div>
    </div>
    <div class="cal-guide">피드백 받은 날(초록)을 탭하면 내용을 볼 수 있어요.<br>다른 날짜를 탭하면 예정 → 휴식 → 초기화 순서로 표시돼요.</div>
    <div id="reportInCal"></div>
  </div>

  <!-- Report tab -->
  <div id="tabReport">
    <div class="report-month-nav">
      <button class="cal-nav" onclick="repMove(-1)">&#8249;</button>
      <div class="rm-label" id="repYM"></div>
      <button class="cal-nav" onclick="repMove(1)">&#8250;</button>
    </div>
    <div id="repContent"></div>
  </div>
</div>

<!-- Session popup -->
<div class="sess-overlay" id="sessOverlay">
  <div class="sess-box">
    <div class="sess-handle"></div>
    <div class="sess-date" id="sessDate"></div>
    <div class="sess-item good" id="sessGood">
      <div class="sess-label">오늘 잘했어요</div>
      <div class="sess-name" id="sessGoodName"></div>
      <div class="sess-text" id="sessGoodText"></div>
    </div>
    <div class="sess-item next" id="sessNext">
      <div class="sess-label">다음번에 더 신경써봐요</div>
      <div class="sess-name" id="sessNextName"></div>
      <div class="sess-text" id="sessNextText"></div>
    </div>
    <button class="sess-close" onclick="closeSess()">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── LEVEL DATA ──────────────────────────────────────────────────
const DATA = {
  1:{name:"LEVEL 1",sub:"AWAKENING — 몸의 감각 깨우기",sections:[
    {title:"A. 기초 호흡 및 코어",items:[
      {n:"01",t:"<strong>기본 호흡 인지:</strong> 코로 들이마시고 입으로 내쉬는 호흡 패턴을 정확히 수행하는가?"},
      {n:"02",t:"<strong>윗가슴 통제:</strong> 숨을 들이마실 때 어깨가 으쓱하고 올라가거나 윗가슴이 과도하게 들리지 않는가?"},
      {n:"03",t:"<strong>흉곽(갈비뼈) 움직임:</strong> 숨을 들이마실 때 갈비뼈를 좌우(양옆)로 벌리고, 내쉴 때 중앙으로 단단하게 모아낼 수 있는가?"},
      {n:"04",t:"<strong>명치(상복부) 텐션 유지:</strong> 갈비뼈를 조여내며 세팅한 명치의 힘이, 다른 동작을 수행하는 내내 풀리지 않고 유지되는가?"},
      {n:"05",t:"<strong>상/하복부 동시 통제:</strong> 아랫배를 위로 지퍼 잠그듯 끌어당기며, 명치 힘과 아랫배 힘을 동시에 조절할 수 있는가?"},
      {n:"06",t:"<strong>골반 기저부 연결:</strong> 양쪽 엉덩이 좌골(뼈)을 안으로 쫀쫀하게 모아주며, 코어 전체를 위로 띄워 올리는 감각을 인지하는가?"}
    ]},
    {title:"B. 어깨 안정화 및 상체",items:[
      {n:"07",t:"<strong>견갑(날개뼈) 하강:</strong> 상완(위팔뼈)을 바깥으로 살짝 회전(로테이션)시키며 날개뼈를 밑으로 쭈욱 끌어내릴 수 있는가?"},

// ── ITEM LOOKUP ─────────────────────────────────────────────────
function getItem(level, num) {
  for (const sec of DATA[level].sections) {
    const item = sec.items.find(i => i.n === num);
    if (item) {
      const nameM = item.t.match(/<strong>([^:]+):/);
      const name = nameM ? nameM[1].trim() : '항목 ' + num;
      const text = item.t.replace(/<[^>]+>/g, '').replace(/^[^:]+:\s*/, '');
      return { name, text };
    }
  }
  return { name: '항목 ' + num, text: '' };
}

// ── STATE ───────────────────────────────────────────────────────
let member = null;
let sessions = {};  // { 'YYYY-MM-DD': { good:'03', next:'07' } }
let calMark = {};   // { 'YYYY-MM-DD': 'p'|'r' }
let calYear, calMonth;
let repYear, repMonth;
const today = new Date();
const todayKey = fmtDate(today.getFullYear(), today.getMonth(), today.getDate());

function fmtDate(y, m, d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

// ── STORAGE ─────────────────────────────────────────────────────
function storKey() { return 'hb2_' + member.phone; }
function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(storKey()) || '{}');
    sessions = d.sessions || {};
    calMark  = d.cal || {};
  } catch { sessions = {}; calMark = {}; }
}
function saveData() {
  localStorage.setItem(storKey(), JSON.stringify({ sessions, cal: calMark }));
}

// ── LOGIN ────────────────────────────────────────────────────────
function doLogin() {
  const name  = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.replace(/\D/g,'');
  const err   = document.getElementById('loginErr');
  err.style.display = 'none';
  if (!member) { err.textContent = '올바른 링크로 접속해주세요.'; err.style.display='block'; return; }
  if (phone !== member.phone) { err.style.display = 'block'; return; }
  // 이름 저장 (표시용)
  member.n = name || '회원';
  localStorage.setItem('hb2_name_' + member.phone, member.n);
  sessionStorage.setItem('hb2_login', member.phone);
  applyPendingFb();
  showDashboard();
}

function doLogout() {
  sessionStorage.removeItem('hb2_login');
  member.n = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

document.getElementById('inp-phone').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('inp-name').addEventListener('keydown',  e => { if(e.key==='Enter') document.getElementById('inp-phone').focus(); });

// ── PENDING FEEDBACK ─────────────────────────────────────────────
let pendingFb = null;

function applyPendingFb() {
  if (!pendingFb) return;
  const prev = sessions[pendingFb.d];
  sessions[pendingFb.d] = { good: pendingFb.g, next: pendingFb.n };
  saveData();

  // Show banner
  const gi = getItem(member.l, pendingFb.g);
  const ni = getItem(member.l, pendingFb.n);
  document.getElementById('fbBannerText').textContent =
    pendingFb.d + ' 수업 — 잘했어요: ' + gi.name + ' · 신경써봐요: ' + ni.name;
  document.getElementById('fbBanner').classList.add('show');
  pendingFb = null;
}

// ── DASHBOARD ────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display   = 'block';

  const lvPillCls = ['','lv1p','lv2p','lv3p','lv4p'];
  const lvNames   = ['','Awakening','Alignment','Connection','Flow'];
  document.getElementById('topName').textContent = member.n + '님';
  const lp = document.getElementById('topLevel');
  lp.textContent = 'L' + member.l + ' · ' + lvNames[member.l];
  lp.className = 'lv-pill ' + lvPillCls[member.l];

  calYear  = today.getFullYear();
  calMonth = today.getMonth();
  repYear  = today.getFullYear();

  renderCalendar();

}

// ── TABS ─────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tbCal').classList.toggle('active', tab==='cal');
  document.getElementById('tbRep').classList.toggle('active', tab==='report');
  document.getElementById('tabCal').style.display    = tab==='cal' ? 'block' : 'none';
  document.getElementById('tabReport').style.display = tab==='report' ? 'block' : 'none';
}

// ── CALENDAR ─────────────────────────────────────────────────────
const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function calMove(dir) {
  calMonth += dir;
  if (calMonth>11) { calMonth=0; calYear++; }
  if (calMonth<0)  { calMonth=11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calYM').textContent = calYear + '년 ' + MONTHS_KO[calMonth];

  const firstDay    = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prefix      = fmtDate(calYear, calMonth, 1).slice(0, 7);
  const isCurrentM  = (calYear===today.getFullYear() && calMonth===today.getMonth());

  // Stats
  const sessDays = Object.keys(sessions).filter(k=>k.startsWith(prefix+'-'));
  const planDays = Object.keys(calMark).filter(k=>k.startsWith(prefix+'-') && calMark[k]==='p');
  const restDays = Object.keys(calMark).filter(k=>k.startsWith(prefix+'-') && calMark[k]==='r');

  document.getElementById('monthStats').innerHTML = `
    <div class="stat-card"><div class="sn" style="color:var(--good)">${sessDays.length}</div><div class="sl">피드백 완료</div></div>
    <div class="stat-card"><div class="sn" style="color:var(--blue)">${planDays.length}</div><div class="sl">운동 예정</div></div>
    <div class="stat-card"><div class="sn" style="color:var(--text-3)">${restDays.length}</div><div class="sl">휴식</div></div>
  `;

  let cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = cells.map(d => {
    if (!d) return '<div class="cal-cell empty"></div>';
    const k = fmtDate(calYear, calMonth, d);
    const isToday = (k === todayKey);
    const isPast  = !isCurrentM || d < today.getDate();
    const sess    = sessions[k];
    const mark    = calMark[k];

    let cls = 'cal-cell';
    let extra = '';
    if (sess) {
      cls += ' session';
      extra = '<div class="cal-dot"></div>';
    } else if (mark==='p') {
      cls += ' planned';
    } else if (mark==='r') {
      cls += ' rest';
    } else if (isPast && !isToday) {
      cls += ' past';
    }
    if (isToday) cls += ' today';

    const click = sess ? `showSess('${k}')` : `toggleDay('${k}')`;
    return `<div class="${cls}" onclick="${click}">${d}${extra}</div>`;
  }).join('');

  // Show report for past months at bottom of calendar
  renderInlineReport();
}

function toggleDay(key) {
  const cur = calMark[key];
  if (!cur)        calMark[key] = 'p';
  else if (cur==='p') calMark[key] = 'r';
  else             delete calMark[key];
  saveData();
  renderCalendar();
}

// ── SESSION POPUP ─────────────────────────────────────────────────
function showSess(key) {
  const sess = sessions[key];
  if (!sess) return;

  const [y,m,d] = key.split('-');
  document.getElementById('sessDate').textContent = y+'년 '+(+m)+'월 '+(+d)+'일 수업 피드백';

  const gi = getItem(member.l, sess.good);
  const ni = getItem(member.l, sess.next);
  document.getElementById('sessGoodName').textContent = gi.name;
  document.getElementById('sessGoodText').textContent = gi.text;
  document.getElementById('sessNextName').textContent = ni.name;
  document.getElementById('sessNextText').textContent = ni.text;

  document.getElementById('sessOverlay').classList.add('open');
}
function closeSess() { document.getElementById('sessOverlay').classList.remove('open'); }
document.getElementById('sessOverlay').addEventListener('click', e => {
  if (e.target===document.getElementById('sessOverlay')) closeSess();
});

// ── MONTHLY REPORT ────────────────────────────────────────────────
function getMonthData(y, m) {
  const prefix = fmtDate(y, m, 1).slice(0, 7);
  const days = Object.keys(sessions).filter(k => k.startsWith(prefix+'-'));
  const goodCount = {}, nextCount = {};
  days.forEach(k => {
    const s = sessions[k];
    if (s.good) goodCount[s.good] = (goodCount[s.good]||0) + 1;
    if (s.next) nextCount[s.next] = (nextCount[s.next]||0) + 1;
  });
  const topGood = Object.entries(goodCount).sort((a,b)=>b[1]-a[1])[0];
  const topNext = Object.entries(nextCount).sort((a,b)=>b[1]-a[1])[0];
  return { count: days.length, topGood, topNext, goodCount, nextCount };
}

function isMonthOver(y, m) {
  const lastDay = new Date(y, m+1, 0);
  const now = new Date();
  // Show report if: month has ended, OR it's the last day of current month
  return lastDay < now || (y===now.getFullYear() && m===now.getMonth() && now.getDate()===lastDay.getDate());
}

function buildReportHTML(y, m, data) {
  if (!data.count) {
    return `<div class="no-data">이 달에 기록된 수업이 없어요.</div>`;
  }
  const nextM = m===11 ? 0 : m+1;
  const nextY = m===11 ? y+1 : y;

  let goodHTML = '', nextHTML = '', recommendHTML = '';

  if (data.topGood) {
    const gi = getItem(member.l, data.topGood[0]);
    goodHTML = `
      <div class="report-item good-item">
        <div class="ri-label">이번 달 잘했어요</div>
        <div class="ri-name">${gi.name}</div>
        <div class="ri-text">${gi.text}</div>
        <div class="ri-count">${data.topGood[1]}회 칭찬받음</div>
      </div>`;
  }
  if (data.topNext) {
    const ni = getItem(member.l, data.topNext[0]);
    nextHTML = `
      <div class="report-item next-item">
        <div class="ri-label">집중이 필요했어요</div>
        <div class="ri-name">${ni.name}</div>
        <div class="ri-text">${ni.text}</div>
        <div class="ri-count">${data.topNext[1]}회 지적됨</div>
      </div>`;
    recommendHTML = `
      <div class="report-recommend">
        <div class="rr-label">${nextY}년 ${MONTHS_KO[nextM]} 집중 포인트</div>
        <div class="rr-text">"${ni.name}" — ${ni.text}</div>
      </div>`;
  }

  return `
    <div class="report-row">
      <div class="report-stat"><div class="rs-num">${data.count}</div><div class="rs-lbl">수업 횟수</div></div>
      <div class="report-stat"><div class="rs-num" style="color:var(--good)">${Object.keys(data.goodCount).length}</div><div class="rs-lbl">칭찬 항목 수</div></div>
      <div class="report-stat"><div class="rs-num" style="color:var(--next)">${Object.keys(data.nextCount).length}</div><div class="rs-lbl">집중 항목 수</div></div>
    </div>
    ${goodHTML}${nextHTML}${recommendHTML}
  `;
}

function renderInlineReport() {
  const el = document.getElementById('reportInCal');
  if (!isMonthOver(calYear, calMonth)) { el.innerHTML = ''; return; }
  const data = getMonthData(calYear, calMonth);
  if (!data.count) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="report-card">
      <div class="report-header">
        <div class="report-title">${calYear}년 ${MONTHS_KO[calMonth]} 결과 리포트</div>
      </div>
      <div class="report-body">${buildReportHTML(calYear, calMonth, data)}</div>
    </div>`;
}

// ── REPORT TAB ────────────────────────────────────────────────────
function repMove(dir) {
  repMonth += dir;
  if (repMonth>11) { repMonth=0; repYear++; }
  if (repMonth<0)  { repMonth=11; repYear--; }
  renderReport();
}

function renderReport() {
  document.getElementById('repYM').textContent = repYear + '년 ' + MONTHS_KO[repMonth];
  const el = document.getElementById('repContent');
  const data = getMonthData(repYear, repMonth);

  if (!isMonthOver(repYear, repMonth)) {
    el.innerHTML = `<div class="no-data">이 달의 리포트는 달이 끝나면 볼 수 있어요.<br>현재 ${data.count}회 수업이 기록되어 있어요.</div>`;
    return;
  }
  el.innerHTML = `
    <div class="report-card">
      <div class="report-header">
        <div class="report-title">${repYear}년 ${MONTHS_KO[repMonth]} 리포트</div>
      </div>
      <div class="report-body">${buildReportHTML(repYear, repMonth, data)}</div>
    </div>`;
}

// ── TOAST ─────────────────────────────────────────────────────────
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── INIT ─────────────────────────────────────────────────────────
(function init() {
  const params = new URLSearchParams(window.location.search);
  const p  = params.get('p');   // 전화번호 11자리
  const l  = params.get('l');   // 레벨
  const fb = params.get('fb');

  if (p && l) {
    const savedName = localStorage.getItem('hb2_name_' + p);
    member = { phone: p, l: parseInt(l), n: savedName || null };
  } else {
    member = null;
  }

  if (member && member.n) {
    document.getElementById('loginGreeting').textContent = '안녕하세요, ' + member.n + '님!';
  }

  if (!member) {
    document.getElementById('loginGreeting').textContent = '링크를 확인해주세요';
    document.querySelector('.login-sub').textContent = '강사님이 보내준 링크로 접속해야 해요.';
    ['inp-name','inp-phone'].forEach(id => document.getElementById(id).disabled = true);
    const btn = document.querySelector('.btn-login');
    btn.disabled = true; btn.style.opacity = '0.4';
    return;
  }

  if (fb) {
    try { pendingFb = JSON.parse(atob(fb)); } catch { pendingFb = null; }
  }

  loadData();

  if (sessionStorage.getItem('hb2_login') === member.phone) {
    applyPendingFb();
    showDashboard();
  }
})();
</script>
